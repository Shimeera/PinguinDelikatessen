<div class="container mt-5">
  @if (produkt()) {
    <div class="row">
      <div class="col-md-6">
        <img src="assets/pinguin-placeholder.jpg" class="img-fluid rounded shadow" alt="Produktbild">
      </div>
      
      <div class="col-md-6">
        <h1>{{ produkt()?.name }} (ID: {{ id }})</h1>
        <p class="lead">{{ produkt()?.description }}</p>
        
        <div class="alert alert-info">
          <strong>Lagerbestand:</strong> {{ produkt()?.stock }} Stück vorhanden
        </div>
        
        <h3 class="text-primary mt-4">{{ produkt()?.price | currency:'EUR' }}</h3>
        <button class="btn btn-success btn-lg mt-3">In den Warenkorb</button>
      </div>
    </div>
  } @else {
    <p>Lade Produkt-Details...</p>
  }
</div>
